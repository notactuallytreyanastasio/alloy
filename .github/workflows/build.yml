name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Temper toolchain
        id: cache-temper
        uses: actions/cache@v4
        with:
          path: ~/temper-toolchain
          key: temper-dev-0.6.1-linux-x64-20260307

      - name: Download Temper (nightly)
        if: steps.cache-temper.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/temper-toolchain
          curl -fSL "https://github.com/temperlang/temper/releases/download/dev/temper-0.6.1-dev%2B137-g6cbfc29-linux-x64.tgz" \
            -o /tmp/temper.tgz
          tar -xzf /tmp/temper.tgz -C ~/temper-toolchain

      - name: Add Temper to PATH and inspect layout
        run: |
          echo "=== Temper toolchain contents ==="
          find ~/temper-toolchain -maxdepth 3 -type f | sort
          echo "=== Finding temper binary ==="
          TEMPER_BIN=$(find ~/temper-toolchain -name "temper" -type f | head -1)
          echo "Binary: $TEMPER_BIN"
          TEMPER_DIR=$(dirname "$TEMPER_BIN")
          echo "$TEMPER_DIR" >> $GITHUB_PATH
          echo "=== Binary type ==="
          file "$TEMPER_BIN"
          echo "=== Script contents (if shell script) ==="
          head -20 "$TEMPER_BIN" || true

      - name: Verify Temper
        run: |
          which temper
          temper --version || true

      - name: Build secure-composition
        working-directory: secure-composition
        run: temper build -b js

      - name: Build ORM
        run: temper build -b js

      - name: Run tests
        run: temper test -b js
