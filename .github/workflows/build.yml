name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Temper toolchain
        id: cache-temper
        uses: actions/cache@v4
        with:
          path: ~/temper-toolchain
          key: temper-dev-0.6.1-linux-x64-20260307

      - name: Download Temper (nightly)
        if: steps.cache-temper.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/temper-toolchain
          curl -fSL "https://github.com/temperlang/temper/releases/download/dev/temper-0.6.1-dev%2B137-g6cbfc29-linux-x64.tgz" \
            -o /tmp/temper.tgz
          tar -xzf /tmp/temper.tgz -C ~/temper-toolchain

      - name: Create temper wrapper using system JDK
        run: |
          TEMPER_DIR=$(find ~/temper-toolchain -name "temper.jar" -type f | head -1 | xargs dirname)
          cat > "$TEMPER_DIR/temper" << 'WRAPPER'
          #!/usr/bin/env sh
          TEMPER_HOME="$(dirname "$0")"
          java -jar "$TEMPER_HOME"/temper.jar "$@"
          WRAPPER
          chmod +x "$TEMPER_DIR/temper"
          echo "$TEMPER_DIR" >> $GITHUB_PATH

      - name: Verify Temper
        run: |
          which temper
          temper --version || true

      - name: Build secure-composition
        working-directory: secure-composition
        run: temper build -b js

      - name: Build ORM
        run: temper build -b js

      - name: Run tests
        run: temper test -b js
