name: Publish compiled libs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Clone and build Temper compiler
        run: |
          git clone https://github.com/temperlang/temper.git /tmp/temper
          cd /tmp/temper
          ./gradlew cli:installDist --no-daemon

      - name: Run temper build
        run: |
          export PATH="/tmp/temper/cli/build/install/temper/bin:$PATH"
          temper build

      - name: Upload temper.out artifact
        uses: actions/upload-artifact@v4
        with:
          name: temper-out
          path: temper.out/
          retention-days: 1

      - name: Upload notify-app template
        uses: actions/upload-artifact@v4
        with:
          name: notify-app-template
          path: .github/notify-app-template.yml
          retention-days: 1

      - name: Upload Temper compiler
        uses: actions/upload-artifact@v4
        with:
          name: temper-compiler
          path: /tmp/temper/cli/build/install/temper/
          retention-days: 1

      - name: Upload ORM source
        uses: actions/upload-artifact@v4
        with:
          name: orm-source
          path: |
            src/
            config.temper.md
            temper.keep/
            secure-composition/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: js
          - lang: py
          - lang: rust
          - lang: java
          - lang: lua
          - lang: csharp
    steps:
      - name: Checkout (for issue creation)
        uses: actions/checkout@v4

      - name: Download Temper compiler
        uses: actions/download-artifact@v4
        with:
          name: temper-compiler
          path: /tmp/temper/

      - name: Download ORM source
        uses: actions/download-artifact@v4
        with:
          name: orm-source
          path: .

      - name: Download temper.out
        uses: actions/download-artifact@v4
        with:
          name: temper-out
          path: temper.out/

      - name: Make Temper executable
        run: chmod +x /tmp/temper/bin/temper

      # --- Runtime setup ---

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node.js
        if: matrix.lang == 'js'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        if: matrix.lang == 'py'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Lua
        if: matrix.lang == 'lua'
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - name: Setup .NET
        if: matrix.lang == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      # --- Step 1: Temper-level tests ---

      - name: Run temper test
        id: temper-test
        run: |
          export PATH="/tmp/temper/bin:$PATH"
          temper test -b ${{ matrix.lang }} 2>&1 | tee temper-test-output.txt
        continue-on-error: true

      # --- Step 2: Native runtime tests on generated code ---

      - name: Install deps (JS)
        if: matrix.lang == 'js'
        run: cd temper.out/js/orm && npm install

      - name: Install deps (Python)
        if: matrix.lang == 'py'
        run: |
          cd temper.out/py
          pip install -e ./temper-core -e ./std -e ./orm

      - name: Install deps (Java)
        if: matrix.lang == 'java'
        run: cd temper.out/java/orm && mvn dependency:resolve -q

      - name: Run native tests (JS)
        if: matrix.lang == 'js'
        id: native-test-js
        run: cd temper.out/js/orm && npm test 2>&1 | tee /tmp/native-test-output.txt
        continue-on-error: true

      - name: Run native tests (Python)
        if: matrix.lang == 'py'
        id: native-test-py
        run: |
          cd temper.out/py
          python -m pytest orm/tests/ -v 2>&1 | tee /tmp/native-test-output.txt
        continue-on-error: true

      - name: Run native tests (Java)
        if: matrix.lang == 'java'
        id: native-test-java
        run: cd temper.out/java/orm && mvn test 2>&1 | tee /tmp/native-test-output.txt
        continue-on-error: true

      - name: Run native tests (Rust)
        if: matrix.lang == 'rust'
        id: native-test-rust
        run: cd temper.out/rust/orm && cargo test 2>&1 | tee /tmp/native-test-output.txt
        continue-on-error: true

      - name: Run native tests (Lua)
        if: matrix.lang == 'lua'
        id: native-test-lua
        run: cd temper.out/lua/orm && lua tests/src-test.lua 2>&1 | tee /tmp/native-test-output.txt
        continue-on-error: true

      - name: Run native tests (C#)
        if: matrix.lang == 'csharp'
        id: native-test-csharp
        run: cd temper.out/csharp/orm/tests && dotnet test --verbosity normal 2>&1 | tee /tmp/native-test-output.txt
        continue-on-error: true

      # --- Collect native test result ---

      - name: Determine native test outcome
        id: native-result
        run: |
          # Grab the outcome from whichever native-test step ran
          LANG="${{ matrix.lang }}"
          case "$LANG" in
            js)     OUTCOME="${{ steps.native-test-js.outcome }}" ;;
            py)     OUTCOME="${{ steps.native-test-py.outcome }}" ;;
            java)   OUTCOME="${{ steps.native-test-java.outcome }}" ;;
            rust)   OUTCOME="${{ steps.native-test-rust.outcome }}" ;;
            lua)    OUTCOME="${{ steps.native-test-lua.outcome }}" ;;
            csharp) OUTCOME="${{ steps.native-test-csharp.outcome }}" ;;
          esac
          echo "outcome=${OUTCOME}" >> $GITHUB_OUTPUT

      # --- Record result for publish gating ---

      - name: Record test result
        run: |
          mkdir -p test-result
          if [ "${{ steps.native-result.outputs.outcome }}" = "success" ]; then
            echo "success" > test-result/status.txt
          else
            echo "failure" > test-result/status.txt
          fi

      - name: Upload test result
        uses: actions/upload-artifact@v4
        with:
          name: test-result-${{ matrix.lang }}
          path: test-result/
          retention-days: 1

      # --- On native failure: upload output + open issue if temper passed ---

      - name: Upload native test output on failure
        if: steps.native-result.outputs.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.lang }}
          path: /tmp/native-test-output.txt
          retention-days: 7

      - name: Open issue — codegen bug (temper passed, native failed)
        if: steps.temper-test.outcome == 'success' && steps.native-result.outputs.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LANG="${{ matrix.lang }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NATIVE_OUTPUT=$(tail -100 /tmp/native-test-output.txt 2>/dev/null || echo "No test output captured")

          # Check for existing open issue to avoid duplicates
          EXISTING=$(gh issue list --state open \
            --search "${LANG} backend native tests failed" \
            --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$(cat <<COMMENT_EOF
          **Still failing** at commit [\`${SHORT_SHA}\`](${RUN_URL})

          \`\`\`
          ${NATIVE_OUTPUT}
          \`\`\`
          COMMENT_EOF
          )"
          else
            gh label create "bug" --color "d73a4a" 2>/dev/null || true
            gh label create "ci" --color "0e8a16" 2>/dev/null || true
            gh label create "codegen" --color "d4c5f9" --description "Temper compiler codegen bug" 2>/dev/null || true

            gh issue create \
              --title "CI: ${LANG} backend native tests failed (codegen bug)" \
              --body "$(cat <<ISSUE_EOF
          ## Codegen Bug: \`temper test\` passed but native ${LANG} tests failed

          \`temper test -b ${LANG}\` **passed**, but running the generated code with the native ${LANG} test runner **failed**. This indicates a bug in the Temper compiler's ${LANG} code generation.

          **Commit:** [\`${SHORT_SHA}\`](https://github.com/${{ github.repository }}/commit/${SHA})
          **Workflow Run:** [View logs](${RUN_URL})
          **Backend:** ${LANG}

          ### Native Test Output (last 100 lines)
          \`\`\`
          ${NATIVE_OUTPUT}
          \`\`\`

          ### Reproduce Locally
          \`\`\`bash
          temper build
          cd temper.out/${LANG}
          # install deps, then run native test command for ${LANG}
          \`\`\`

          ### Impact
          The ${LANG} backend was **not published** and app repos were **not updated**.
          Other backends that passed were published normally.
          ISSUE_EOF
          )" \
              --label "bug,ci,codegen"
          fi

      - name: Fail job if native tests failed
        if: steps.native-result.outputs.outcome == 'failure'
        run: |
          echo "::error::Native ${LANG} tests failed — skipping publish"
          exit 1

  publish:
    needs: [build, test]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: js
            lang_upper: JS
            repo: alloy-js
            app_repo: alloy-js-app
            vendor_path: vendor
            full_tree: true
          - lang: py
            lang_upper: PY
            repo: alloy-py
            app_repo: alloy-py-app
            vendor_path: vendor
            full_tree: true
          - lang: csharp
            lang_upper: CSHARP
            repo: alloy-csharp
            app_repo: alloy-csharp-app
            vendor_path: TodoApp/vendor
            full_tree: true
          - lang: rust
            lang_upper: RUST
            repo: alloy-rust
            app_repo: alloy-rust-app
            vendor_path: vendor
            full_tree: true
          - lang: java
            lang_upper: JAVA
            repo: alloy-java
            app_repo: alloy-java-app
            vendor_path: vendor
            full_tree: true
          - lang: lua
            lang_upper: LUA
            repo: alloy-lua
            app_repo: alloy-lua-app
            vendor_path: vendor
            full_tree: true

    steps:
      - name: Download test result
        uses: actions/download-artifact@v4
        with:
          name: test-result-${{ matrix.lang }}
          path: test-result-${{ matrix.lang }}/
        continue-on-error: true

      - name: Check test result
        id: gate
        run: |
          status=$(cat test-result-${{ matrix.lang }}/status.txt 2>/dev/null || echo "failure")
          if [ "$status" != "success" ]; then
            echo "Tests failed for ${{ matrix.lang }} backend — skipping publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Download temper.out artifact
        if: steps.gate.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: temper-out
          path: temper.out/

      - name: Download notify-app template
        if: steps.gate.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: notify-app-template
          path: templates/

      - name: Set up SSH
        if: steps.gate.outputs.skip != 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets[format('DEPLOY_KEY_{0}', matrix.lang_upper)] }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global core.sshCommand "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

      - name: Clone target lib repo
        if: steps.gate.outputs.skip != 'true'
        run: |
          git clone git@github.com:notactuallytreyanastasio/${{ matrix.repo }}.git target-repo
          cd target-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Sync compiled output
        if: steps.gate.outputs.skip != 'true'
        run: |
          cd target-repo

          # Remove old files (except .git and workflows)
          find . -maxdepth 1 -not -name '.git' -not -name '.' -not -name '.github' | xargs rm -rf

          if [ "${{ matrix.full_tree }}" = "true" ]; then
            # Copy full tree (orm/ + std/ + temper-core/)
            cp -r ../temper.out/${{ matrix.lang }}/* .
          else
            # Copy only orm/ subdir contents
            cp -r ../temper.out/${{ matrix.lang }}/orm/* .
          fi

          # Write version info
          echo "${{ github.sha }}" > VERSION

      - name: Write notify-app workflow
        if: steps.gate.outputs.skip != 'true'
        run: |
          mkdir -p target-repo/.github/workflows
          cp templates/notify-app-template.yml target-repo/.github/workflows/notify-app.yml
          sed -i "s|__APP_REPO__|${{ matrix.app_repo }}|g" target-repo/.github/workflows/notify-app.yml
          sed -i "s|__VENDOR_PATH__|${{ matrix.vendor_path }}|g" target-repo/.github/workflows/notify-app.yml

      - name: Commit and push
        if: steps.gate.outputs.skip != 'true'
        run: |
          cd target-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update from alloy ${{ github.sha }}"
            git push
          fi
